<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASU CTF Trainer // INSA Prep</title>
<style>
:root{
  --bg:#06080f;
  --bg2:#0a0e1a;
  --panel:#0d1220;
  --border:#16203a;
  --cyan:#00d4ff;
  --green:#39ff88;
  --purple:#a78bfa;
  --red:#ff4d6d;
  --yellow:#ffd166;
  --text:#c9d6f0;
  --text-dim:#7c89ab;
  --mono:'JetBrains Mono','Fira Code',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(circle at 15% 20%, rgba(0,212,255,0.07), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(167,139,250,0.07), transparent 40%);
  color:var(--text);
  font-family:var(--mono);
  min-height:100vh;
  line-height:1.5;
  padding:20px;
}
.wrap{max-width:1000px;margin:0 auto;}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:16px;
  border-bottom:1px solid var(--border);
  padding-bottom:18px;margin-bottom:24px;
}
.logo{font-size:1.4rem;color:var(--cyan);font-weight:700;letter-spacing:1px;}
.logo span{color:var(--green);}
.logo small{display:block;font-size:0.65rem;color:var(--text-dim);font-weight:400;letter-spacing:2px;margin-top:2px;}
.stats{display:flex;gap:14px;flex-wrap:wrap;}
.stat-box{
  background:var(--panel);border:1px solid var(--border);
  padding:8px 14px;border-radius:8px;text-align:center;min-width:80px;
}
.stat-box .v{font-size:1.1rem;color:var(--green);font-weight:700;}
.stat-box .l{font-size:0.6rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}

/* PROGRESS */
.progress-track{
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;margin-bottom:22px;
}
.progress-bar-bg{
  background:#0a0f1c;border-radius:6px;height:10px;overflow:hidden;
  border:1px solid var(--border);margin-top:8px;
}
.progress-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));
  width:0%;transition:width .4s ease;
}
.level-dots{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.dot{
  width:30px;height:30px;border-radius:6px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:0.7rem;
  color:var(--text-dim);background:#0a0f1c;cursor:pointer;transition:all .2s;
}
.dot.done{background:rgba(57,255,136,0.12);border-color:var(--green);color:var(--green);}
.dot.active{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,0.4);}
.dot.locked{opacity:0.4;cursor:not-allowed;}

/* NAV */
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{
  background:var(--panel);border:1px solid var(--border);color:var(--text-dim);
  padding:8px 14px;border-radius:6px;font-family:var(--mono);font-size:0.75rem;
  cursor:pointer;transition:all .2s;
}
.tab-btn:hover{color:var(--text);border-color:var(--cyan);}
.tab-btn.active{background:rgba(0,212,255,0.1);color:var(--cyan);border-color:var(--cyan);}

/* PANEL */
.panel{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:26px;margin-bottom:20px;
}
.panel h2{color:var(--cyan);font-size:1.15rem;margin-bottom:6px;}
.panel .sub{color:var(--text-dim);font-size:0.78rem;margin-bottom:18px;}
.tag{
  display:inline-block;font-size:0.62rem;padding:3px 9px;border-radius:20px;
  letter-spacing:1px;text-transform:uppercase;margin-right:6px;margin-bottom:14px;
}
.tag.easy{background:rgba(57,255,136,0.12);color:var(--green);border:1px solid var(--green);}
.tag.med{background:rgba(255,209,102,0.12);color:var(--yellow);border:1px solid var(--yellow);}
.tag.hard{background:rgba(255,77,109,0.12);color:var(--red);border:1px solid var(--red);}
.tag.pts{background:rgba(167,139,250,0.12);color:var(--purple);border:1px solid var(--purple);}

.section-title{
  color:var(--green);font-size:0.85rem;margin:18px 0 8px;
  border-left:3px solid var(--green);padding-left:8px;
}
.lesson-box{
  background:#0a0f1c;border:1px solid var(--border);border-radius:8px;
  padding:16px;margin-bottom:14px;font-size:0.85rem;color:var(--text);
}
.lesson-box code, .inline-code{
  background:#10182c;color:var(--cyan);padding:2px 6px;border-radius:4px;
  font-size:0.82rem;border:1px solid var(--border);
}
pre.codeblock{
  background:#0a0f1c;border:1px solid var(--border);border-radius:8px;
  padding:14px;overflow-x:auto;font-size:0.8rem;color:var(--green);
  margin:10px 0;white-space:pre-wrap;word-break:break-word;
}
.step{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start;}
.step-num{
  background:rgba(0,212,255,0.12);color:var(--cyan);border:1px solid var(--cyan);
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;flex-shrink:0;margin-top:2px;
}
.step-text{font-size:0.85rem;color:var(--text);}

.try-box{
  background:#0a0f1c;border:1px dashed var(--border);border-radius:8px;
  padding:14px;margin:10px 0;
}
.try-box label{font-size:0.72rem;color:var(--text-dim);display:block;margin-bottom:6px;}
.try-box input{
  width:100%;background:#0d1220;border:1px solid var(--border);color:var(--cyan);
  padding:8px 10px;border-radius:6px;font-family:var(--mono);font-size:0.85rem;margin-bottom:8px;
}
.try-box button, .mini-btn{
  background:rgba(167,139,250,0.12);color:var(--purple);border:1px solid var(--purple);
  padding:6px 12px;border-radius:6px;font-family:var(--mono);font-size:0.72rem;cursor:pointer;
}
.try-box button:hover, .mini-btn:hover{background:rgba(167,139,250,0.25);}
.try-result{font-size:0.8rem;margin-top:8px;color:var(--green);min-height:1em;}

/* FLAG SUBMISSION */
.flag-form{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
.flag-form input{
  flex:1;min-width:220px;background:#0a0f1c;border:1px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:8px;font-family:var(--mono);
  font-size:0.9rem;
}
.flag-form input:focus{outline:none;border-color:var(--cyan);}
.btn{
  background:linear-gradient(135deg,var(--cyan),#0090b0);color:#001018;
  border:none;padding:12px 22px;border-radius:8px;font-family:var(--mono);
  font-weight:700;font-size:0.85rem;cursor:pointer;letter-spacing:0.5px;
  transition:transform .15s;
}
.btn:hover{transform:translateY(-1px);}
.btn.secondary{background:transparent;color:var(--purple);border:1px solid var(--purple);}
.btn.danger{background:transparent;color:var(--red);border:1px solid var(--red);}
.feedback{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:0.85rem;display:none;}
.feedback.ok{background:rgba(57,255,136,0.1);border:1px solid var(--green);color:var(--green);display:block;}
.feedback.fail{background:rgba(255,77,109,0.1);border:1px solid var(--red);color:var(--red);display:block;}

/* HINTS */
.hints-area{margin-top:16px;}
.hint-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.hint-card{
  background:rgba(255,209,102,0.08);border:1px solid var(--yellow);border-radius:8px;
  padding:10px 14px;font-size:0.8rem;color:var(--yellow);margin-top:8px;display:none;
}
.hint-card.show{display:block;}
.hint-cost{font-size:0.65rem;color:var(--text-dim);}

footer{
  text-align:center;color:var(--text-dim);font-size:0.7rem;
  margin-top:30px;padding-top:18px;border-top:1px solid var(--border);
}
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--panel);
  border:1px solid var(--green);color:var(--green);padding:12px 18px;
  border-radius:8px;font-size:0.8rem;box-shadow:0 4px 20px rgba(0,0,0,0.4);
  transform:translateY(100px);opacity:0;transition:all .3s ease;z-index:999;
}
.toast.show{transform:translateY(0);opacity:1;}
.complete-banner{
  text-align:center;padding:40px 20px;
}
.complete-banner h2{color:var(--green);font-size:1.6rem;margin-bottom:10px;}
.complete-banner p{color:var(--text-dim);font-size:0.85rem;}
@media(max-width:600px){
  .stats{width:100%;justify-content:space-between;}
  .stat-box{flex:1;}
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">MASU<span>_</span>CTF // TRAINER
      <small>OFFLINE INSA PREP MODULE</small>
    </div>
    <div class="stats">
      <div class="stat-box"><div class="v" id="scoreVal">0</div><div class="l">Score</div></div>
      <div class="stat-box"><div class="v" id="solvedVal">0/6</div><div class="l">Solved</div></div>
      <div class="stat-box"><div class="v" id="hintVal">0</div><div class="l">Hints Used</div></div>
    </div>
  </header>

  <div class="progress-track">
    <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-dim);">
      <span>OVERALL PROGRESS</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="level-dots" id="levelDots"></div>
  </div>

  <div class="tabs" id="tabBar"></div>

  <div id="levelContainer"></div>

  <div class="panel" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
    <span style="font-size:0.75rem;color:var(--text-dim);">Progress is saved automatically in this browser (localStorage).</span>
    <button class="btn danger" onclick="resetProgress()">Reset All Progress</button>
  </div>

  <footer>MASU Cyber Academy — Offline CTF Trainer — Works 100% without internet — Built for INSA Cyber Talent prep</footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   MASU CTF TRAINER - fully offline, single file, no libraries
   ============================================================ */

const LEVELS = [
  {
    id:1,
    title:"Base64 Decoding",
    category:"Cryptography",
    difficulty:"easy",
    points:100,
    summary:"Learn to recognize and decode Base64 — the most common encoding scheme you'll see in CTFs.",
    lesson:`
      <div class="lesson-box">
        <strong>What is Base64?</strong><br>
        Base64 is an <em>encoding</em> (not encryption) scheme that turns binary/text data into
        a set of 64 printable ASCII characters: <code>A-Z a-z 0-9 + /</code>, often padded with <code>=</code> at the end.
        It's reversible with no key — if you see a string made only of those characters, especially
        ending in <code>=</code> or <code>==</code>, suspect Base64 immediately.
      </div>
      <div class="section-title">How to decode it</div>
      <div class="step"><div class="step-num">1</div><div class="step-text">Identify the charset: only letters, digits, <code>+</code>, <code>/</code>, and padding <code>=</code>.</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-text">On Linux/Arch, decode from the terminal:</div></div>
      <pre class="codeblock">echo "SU5TQXtiYXNlNjRfd2FybXVwfQ==" | base64 -d</pre>
      <div class="step"><div class="step-num">3</div><div class="step-text">In Python (useful when scripting CTF solves):</div></div>
      <pre class="codeblock">import base64
print(base64.b64decode("SU5TQXtiYXNlNjRfd2FybXVwfQ==").decode())</pre>
      <div class="step"><div class="step-num">4</div><div class="step-text">Watch for <strong>multi-layer encoding</strong> — sometimes the output of one decode is itself Base64 or Hex. Always re-check the output's charset.</div></div>
    `,
    practice:{
      label:"Try it yourself — decode this in your head/terminal, then paste the result below to check:",
      challenge:"SGVsbG9fSU5TQQ==",
      answer:"hello_insa",
      placeholder:"type the decoded text here"
    },
    flagPrompt:"Now decode the REAL challenge string below and submit the resulting flag.",
    challengeData:"SU5TQXtiYXNlNjRfd2FybXVwfQ==",
    flag:"INSA{base64_warmup}",
    hints:[
      "This is standard Base64 — look for the trailing '==' padding.",
      "Use `echo '<string>' | base64 -d` in your terminal.",
      "The decoded text follows the format INSA{...} — that whole string IS the flag."
    ]
  },
  {
    id:2,
    title:"Caesar Cipher",
    category:"Cryptography",
    difficulty:"easy",
    points:100,
    summary:"Crack a classic substitution cipher by shifting letters — and learn to brute-force all 25 shifts.",
    lesson:`
      <div class="lesson-box">
        <strong>What is a Caesar Cipher?</strong><br>
        Each letter in the plaintext is shifted by a fixed number of positions in the alphabet.
        A shift of 3 turns A→D, B→E, etc. With only 25 possible shifts, it's always brute-forceable.
      </div>
      <div class="section-title">How to crack it</div>
      <div class="step"><div class="step-num">1</div><div class="step-text">Try every shift from 1–25 and look for readable English.</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-text">Quick Python brute-force script (keep this in your toolkit):</div></div>
      <pre class="codeblock">def caesar(text, shift):
    out = ""
    for c in text:
        if c.isalpha():
            base = 65 if c.isupper() else 97
            out += chr((ord(c)-base+shift)%26+base)
        else:
            out += c
    return out

cipher = "LQVD{fdhvdu_lv_idvw}"
for s in range(26):
    print(s, caesar(cipher, s))</pre>
      <div class="step"><div class="step-num">3</div><div class="step-text">CLI one-liner using <code>tr</code> for a single known shift (e.g. ROT13):</div></div>
      <pre class="codeblock">echo "Uryyb" | tr 'A-Za-z' 'N-ZA-Mn-za-m'</pre>
      <div class="step"><div class="step-num">4</div><div class="step-text">In a real CTF, write the brute-force script once and reuse it — don't shift by hand under time pressure.</div></div>
    `,
    practice:{
      label:"Practice shift: decode this (shift used = 3). Type the plaintext:",
      challenge:"Khoor",
      answer:"hello",
      placeholder:"type plaintext here"
    },
    flagPrompt:"Brute-force this Caesar-shifted flag and submit the decoded result:",
    challengeData:"LQVD{fdhvdu_lv_idvw}",
    flag:"INSA{caesar_is_fast}",
    hints:[
      "The flag format is INSA{...}. Find the shift where 'LQVD' becomes 'INSA'.",
      "L→I is a shift back of 3 letters. Apply that same shift to the rest.",
      "Decoded flag: INSA{caesar_is_fast}"
    ]
  },
  {
    id:3,
    title:"XOR & Hex Forensics",
    category:"Cryptography / Forensics",
    difficulty:"med",
    points:150,
    summary:"Decode hex-encoded bytes and reverse a single-byte XOR — a core CTF crypto skill.",
    lesson:`
      <div class="lesson-box">
        <strong>Hex encoding</strong> represents each byte as two hex digits (0-9, a-f).
        <strong>XOR</strong> is reversible: if <code>C = P XOR K</code>, then <code>P = C XOR K</code>.
        Single-byte XOR ciphers can be brute-forced across all 256 possible key values.
      </div>
      <div class="section-title">Workflow</div>
      <div class="step"><div class="step-num">1</div><div class="step-text">Convert hex to bytes first.</div></div>
      <pre class="codeblock">bytes.fromhex("1a2b3c4d")</pre>
      <div class="step"><div class="step-num">2</div><div class="step-text">Brute-force every possible single-byte XOR key (0–255) and print anything readable:</div></div>
      <pre class="codeblock">data = bytes.fromhex("0a1d1a1f470b1a4c081a4359441a")
for key in range(256):
    out = bytes([b ^ key for b in data])
    if all(32 <= c < 127 for c in out):
        print(key, out.decode())</pre>
      <div class="step"><div class="step-num">3</div><div class="step-text">If you know part of the plaintext (e.g. you expect "INSA{"), XOR that known plaintext against the matching ciphertext bytes to directly recover the key — much faster than full brute force.</div></div>
      <div class="step"><div class="step-num">4</div><div class="step-text">In forensics challenges, this same "guess a known header/string" trick applies to file signatures (magic bytes) too.</div></div>
    `,
    practice:{
      label:"Quick check: XOR of 0x41 ('A') with key 0x20 gives which ASCII character? (lowercase)",
      challenge:"0x41 XOR 0x20",
      answer:"a",
      placeholder:"single character"
    },
    flagPrompt:"This hex string is single-byte XOR encoded. Find the key, decode it, and submit the flag:",
    challengeData:"272D2024292463202D2C2F392063202D286B2C61306B2C",
    flag:"INSA{xor_and_hex_combo}",
    hints:[
      "Convert hex to bytes first, then brute-force keys 0-255 looking for printable ASCII.",
      "You know the flag starts with 'I'. XOR the first hex byte (0x27) against 'I' (0x49) to get the key directly.",
      "Key is 0x66. Decoded flag: INSA{xor_and_hex_combo}"
    ]
  },
  {
    id:4,
    title:"SQL Injection Logic",
    category:"Web Exploitation",
    difficulty:"med",
    points:150,
    summary:"Understand how a login form's SQL query can be broken with classic injection payloads.",
    lesson:`
      <div class="lesson-box">
        A vulnerable login typically builds a query like:<br>
        <code>SELECT * FROM users WHERE username='$user' AND password='$pass'</code><br>
        If input isn't sanitized, you can inject SQL syntax to alter the query's logic.
      </div>
      <div class="section-title">Classic bypass payloads</div>
      <div class="step"><div class="step-num">1</div><div class="step-text">Comment out the password check entirely:</div></div>
      <pre class="codeblock">username: admin' --
password: anything</pre>
      <div class="step"><div class="step-num">2</div><div class="step-text">Resulting query becomes:</div></div>
      <pre class="codeblock">SELECT * FROM users WHERE username='admin' --' AND password='anything'</pre>
      <div class="step"><div class="step-num">3</div><div class="step-text">Force a query to always be true using OR logic:</div></div>
      <pre class="codeblock">username: ' OR '1'='1
password: ' OR '1'='1</pre>
      <div class="step"><div class="step-num">4</div><div class="step-text">For UNION-based extraction (data exfiltration, not just login bypass), you need to match column counts first:</div></div>
      <pre class="codeblock">' UNION SELECT username, password FROM users --</pre>
      <div class="step"><div class="step-num">5</div><div class="step-text">Defense reminder for your own projects (e.g. MASU Cyber Academy): always use parameterized queries / prepared statements, never string-concatenate user input into SQL.</div></div>
    `,
    practice:{
      label:"Which SQL comment syntax is used to truncate the rest of a query in MySQL? (2 characters)",
      challenge:"MySQL line comment symbol",
      answer:"--",
      placeholder:"e.g. -- or #"
    },
    flagPrompt:"A login form checks: SELECT * FROM users WHERE user='INPUT' AND pass='x'. Craft a username payload that comments out the password check, ending in admin' --  — the flag is the technique name in this exact format: INSA{technique_with_underscores}. The intended answer:",
    challengeData:"Vulnerable query: SELECT * FROM users WHERE username='$u' AND password='$p'. Bypass it using a comment-based injection.",
    flag:"INSA{sql_comment_bypass}",
    hints:[
      "Think about how SQL comments (-- or #) can cut off the rest of a WHERE clause.",
      "The technique name combines 'sql', 'comment', and 'bypass'.",
      "Flag: INSA{sql_comment_bypass}"
    ]
  },
  {
    id:5,
    title:"Reflected XSS Basics",
    category:"Web Exploitation",
    difficulty:"med",
    points:150,
    summary:"Identify and craft a payload for a reflected Cross-Site Scripting vulnerability.",
    lesson:`
      <div class="lesson-box">
        Reflected XSS happens when user input is echoed back into the page's HTML/JS
        without sanitization — e.g. a search box that prints <code>You searched for: &lt;input&gt;</code>.
      </div>
      <div class="section-title">Identifying it</div>
      <div class="step"><div class="step-num">1</div><div class="step-text">Test with a harmless probe string first:</div></div>
      <pre class="codeblock">"><svg onload=alert(1)></pre>
      <div class="step"><div class="step-num">2</div><div class="step-text">Classic alert-box proof-of-concept payload:</div></div>
      <pre class="codeblock">&lt;script&gt;alert(document.cookie)&lt;/script&gt;</pre>
      <div class="step"><div class="step-num">3</div><div class="step-text">If <code>&lt;script&gt;</code> tags get filtered, try event-handler based payloads which don't need the script tag:</div></div>
      <pre class="codeblock">&lt;img src=x onerror=alert(1)&gt;</pre>
      <div class="step"><div class="step-num">4</div><div class="step-text">In real attacks the payload would exfiltrate cookies/session tokens to an attacker server instead of alert() — but in CTFs, popping <code>alert()</code> or printing a specific value is usually the proof needed.</div></div>
      <div class="step"><div class="step-num">5</div><div class="step-text">Defense: output-encode user input (HTML-escape <code>&lt; &gt; " '</code>) and set a Content-Security-Policy header.</div></div>
    `,
    practice:{
      label:"Which JS function is most commonly used as the harmless XSS proof-of-concept payload?",
      challenge:"common JS PoC function",
      answer:"alert",
      placeholder:"function name"
    },
    flagPrompt:"What HTML attribute lets you trigger JavaScript on a broken image WITHOUT using a <script> tag? Answer in this exact flag format: INSA{attribute_name}",
    challengeData:"A search page reflects your query directly into HTML output. <script> tags are filtered. Find another way to execute JS.",
    flag:"INSA{onerror}",
    hints:[
      "Think about image tags and what fires when the image URL is invalid.",
      "It's an event handler attribute, like onload but for failed resource loads.",
      "Flag: INSA{onerror}"
    ]
  },
  {
    id:6,
    title:"Linux Privilege Escalation",
    category:"Linux / PrivEsc",
    difficulty:"hard",
    points:200,
    summary:"Find and exploit a misconfigured SUID binary to escalate from a low-priv shell to root.",
    lesson:`
      <div class="lesson-box">
        Privilege escalation on Linux often comes from misconfigurations: SUID binaries,
        weak sudo rules, writable cron jobs, or exposed credentials — not just kernel exploits.
      </div>
      <div class="section-title">Standard enumeration steps</div>
      <div class="step"><div class="step-num">1</div><div class="step-text">Check what you can run as another user via sudo:</div></div>
      <pre class="codeblock">sudo -l</pre>
      <div class="step"><div class="step-num">2</div><div class="step-text">Find SUID binaries (run with owner's privileges, not the caller's):</div></div>
      <pre class="codeblock">find / -perm -4000 -type f 2>/dev/null</pre>
      <div class="step"><div class="step-num">3</div><div class="step-text">Cross-reference any unusual binaries you find against <strong>GTFOBins</strong> (offline copy recommended for CTFs with limited internet) — it lists exploitation steps for common binaries when they have SUID, sudo rights, or capabilities.</div></div>
      <div class="step"><div class="step-num">4</div><div class="step-text">Example: if <code>find</code> itself has the SUID bit and is owned by root, you can spawn a root shell directly:</div></div>
      <pre class="codeblock">find . -exec /bin/sh -p \\; -quit</pre>
      <div class="step"><div class="step-num">5</div><div class="step-text">Other common vectors to always check: writable <code>/etc/passwd</code>, cron jobs running as root that call scripts you can edit, capabilities via <code>getcap -r / 2>/dev/null</code>, and exposed SSH keys or config files with secrets.</div></div>
    `,
    practice:{
      label:"What command lists all SUID binaries on the filesystem? (just the core command name)",
      challenge:"command to find SUID files",
      answer:"find",
      placeholder:"command name"
    },
    flagPrompt:"You find that /usr/bin/vim has the SUID bit set and is owned by root. Using GTFOBins logic, vim can execute shell commands. What single vim command (inside vim, after :) spawns a shell? Answer with just the command after the colon, e.g. format: INSA{the_command}",
    challengeData:"ls -la /usr/bin/vim → -rwsr-xr-x 1 root root ... /usr/bin/vim (SUID bit set, owned by root)",
    flag:"INSA{!sh}",
    hints:[
      "In vim command mode, the ! prefix lets you run a shell command.",
      "Typing :!sh while vim is running as root (due to SUID) gives you a root shell.",
      "Flag: INSA{!sh}"
    ]
  }
];

const STORAGE_KEY = "masu_ctf_trainer_v1";
let state = loadState();

function defaultState(){
  let lv = {};
  LEVELS.forEach(l => lv[l.id] = {solved:false, hintsUsed:0, attempts:0});
  return {score:0, levels:lv, activeLevel:1, totalHints:0};
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    // ensure all levels exist (in case LEVELS changes)
    const d = defaultState();
    Object.assign(d, parsed);
    LEVELS.forEach(l=>{ if(!d.levels[l.id]) d.levels[l.id] = {solved:false, hintsUsed:0, attempts:0}; });
    return d;
  }catch(e){
    return defaultState();
  }
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function resetProgress(){
  if(!confirm("This will erase all score, solved levels, and hint usage. Continue?")) return;
  state = defaultState();
  saveState();
  renderAll();
  showToast("Progress reset.");
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function isUnlocked(levelId){
  if(levelId === 1) return true;
  return state.levels[levelId-1] && state.levels[levelId-1].solved;
}

function setActiveLevel(id){
  if(!isUnlocked(id)){
    showToast("Solve the previous level first.");
    return;
  }
  state.activeLevel = id;
  saveState();
  renderAll();
}

function normalize(str){
  return str.trim().toLowerCase().replace(/\s+/g,' ');
}

function checkPractice(levelId){
  const level = LEVELS.find(l=>l.id===levelId);
  const input = document.getElementById('practiceInput_'+levelId);
  const resultEl = document.getElementById('practiceResult_'+levelId);
  const val = normalize(input.value);
  const expected = normalize(level.practice.answer);
  if(val === expected){
    resultEl.textContent = "✓ Correct! You understand the technique — now try the real flag below.";
    resultEl.style.color = "var(--green)";
  } else {
    resultEl.textContent = "✗ Not quite. Re-check the lesson steps above and try again.";
    resultEl.style.color = "var(--red)";
  }
}

function checkFlag(levelId){
  const level = LEVELS.find(l=>l.id===levelId);
  const input = document.getElementById('flagInput_'+levelId);
  const fb = document.getElementById('feedback_'+levelId);
  const submitted = input.value.trim();
  const lvState = state.levels[levelId];

  lvState.attempts++;

  if(submitted === level.flag){
    if(!lvState.solved){
      lvState.solved = true;
      const hintPenalty = lvState.hintsUsed * 15;
      const earned = Math.max(level.points - hintPenalty, 20);
      state.score += earned;
      fb.textContent = "✓ CORRECT! Flag accepted. +" + earned + " points" + (hintPenalty>0 ? " (after hint penalty)" : "") + ". Next level unlocked.";
      fb.className = "feedback ok";
      saveState();
      renderAll();
      showToast("Level " + levelId + " solved! +" + earned + " pts");
    } else {
      fb.textContent = "✓ Correct (already solved — no extra points awarded).";
      fb.className = "feedback ok";
    }
  } else {
    fb.textContent = "✗ Incorrect flag. Review the lesson steps, or use a hint if you're stuck.";
    fb.className = "feedback fail";
    saveState();
  }
}

function useHint(levelId, hintIndex){
  const lvState = state.levels[levelId];
  const card = document.getElementById('hintCard_'+levelId+'_'+hintIndex);
  if(!card.classList.contains('show')){
    card.classList.add('show');
    lvState.hintsUsed++;
    state.totalHints++;
    saveState();
    renderStats();
  }
}

function renderStats(){
  document.getElementById('scoreVal').textContent = state.score;
  const solvedCount = LEVELS.filter(l=>state.levels[l.id].solved).length;
  document.getElementById('solvedVal').textContent = solvedCount + "/" + LEVELS.length;
  document.getElementById('hintVal').textContent = state.totalHints;
  const pct = Math.round((solvedCount/LEVELS.length)*100);
  document.getElementById('progressFill').style.width = pct + "%";
  document.getElementById('progressPct').textContent = pct + "%";
}

function renderDots(){
  const container = document.getElementById('levelDots');
  container.innerHTML = '';
  LEVELS.forEach(l=>{
    const d = document.createElement('div');
    const unlocked = isUnlocked(l.id);
    const solved = state.levels[l.id].solved;
    d.className = 'dot' + (solved ? ' done' : '') + (l.id===state.activeLevel ? ' active' : '') + (!unlocked ? ' locked' : '');
    d.textContent = solved ? '✓' : l.id;
    d.title = l.title + (unlocked ? '' : ' (locked)');
    d.onclick = () => setActiveLevel(l.id);
    container.appendChild(d);
  });
}

function renderTabs(){
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  LEVELS.forEach(l=>{
    const btn = document.createElement('button');
    const unlocked = isUnlocked(l.id);
    btn.className = 'tab-btn' + (l.id===state.activeLevel ? ' active' : '');
    btn.textContent = (state.levels[l.id].solved ? '✓ ' : (unlocked ? '' : '🔒 ')) + 'Lvl ' + l.id;
    btn.onclick = () => setActiveLevel(l.id);
    bar.appendChild(btn);
  });
}

function renderLevel(){
  const container = document.getElementById('levelContainer');
  const level = LEVELS.find(l=>l.id === state.activeLevel);
  const lvState = state.levels[level.id];

  if(!isUnlocked(level.id)){
    container.innerHTML = `<div class="panel"><h2>🔒 Locked</h2><p class="sub">Solve previous levels to unlock this one.</p></div>`;
    return;
  }

  const allSolved = LEVELS.every(l=>state.levels[l.id].solved);

  let hintsHtml = level.hints.map((h,i)=>`
    <div class="hint-row">
      <button class="mini-btn" onclick="useHint(${level.id},${i})">Reveal Hint ${i+1}</button>
      <span class="hint-cost">(-15 pts if used before solving)</span>
    </div>
    <div class="hint-card" id="hintCard_${level.id}_${i}">${h}</div>
  `).join('');

  container.innerHTML = `
    <div class="panel">
      <span class="tag ${level.difficulty}">${level.difficulty.toUpperCase()}</span>
      <span class="tag pts">${level.points} PTS</span>
      <span class="tag" style="color:var(--text-dim);border:1px solid var(--border);">${level.category}</span>
      <h2>Level ${level.id}: ${level.title} ${lvState.solved ? ' — ✓ SOLVED' : ''}</h2>
      <p class="sub">${level.summary}</p>

      <div class="section-title">📘 Lesson</div>
      ${level.lesson}

      <div class="section-title">🧪 Practice (no points, just confirms understanding)</div>
      <div class="try-box">
        <label>${level.practice.label}</label>
        <input type="text" id="practiceInput_${level.id}" placeholder="${level.practice.placeholder}">
        <button onclick="checkPractice(${level.id})">Check Practice Answer</button>
        <div class="try-result" id="practiceResult_${level.id}"></div>
      </div>

      <div class="section-title">🚩 Challenge</div>
      <div class="lesson-box">
        <strong>Scenario / Data:</strong><br>
        <code style="word-break:break-all;">${level.challengeData}</code>
      </div>
      <p class="sub" style="margin-bottom:10px;">${level.flagPrompt}</p>

      <div class="flag-form">
        <input type="text" id="flagInput_${level.id}" placeholder="Submit flag, e.g. INSA{...}">
        <button class="btn" onclick="checkFlag(${level.id})">Submit Flag</button>
      </div>
      <div class="feedback" id="feedback_${level.id}"></div>

      <div class="section-title">💡 Hints</div>
      <div class="hints-area">${hintsHtml}</div>
    </div>

    ${allSolved ? `
    <div class="panel complete-banner">
      <h2>🏆 All Levels Complete</h2>
      <p>Final score: ${state.score} points across ${LEVELS.length} challenges.</p>
      <p>You've drilled Base64, Caesar, XOR/Hex, SQLi logic, XSS, and Linux privesc — good coverage for the INSA second round. Reset anytime to redo with fresh muscle memory.</p>
    </div>` : ''}
  `;
}

function renderAll(){
  renderStats();
  renderDots();
  renderTabs();
  renderLevel();
}

renderAll();
</script>
</body>
</html>
